name: adapters-ci

on:
  push:
    paths:
      - "adapters/**"
      - ".github/workflows/adapters-ci.yml"
  pull_request:
    paths:
      - "adapters/**"
      - ".github/workflows/adapters-ci.yml"
  workflow_dispatch:

jobs:
  adapters:
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.ref != 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - name: Clone sibling repos at pinned SHAs
        run: |
          set -euo pipefail
          PF_SHA=a567c8dca015fac3890fddbb77dfd254caa720d8
          PCS_SHA=280bbea4bf3bf3e45004b6254bc72b603030f179
          PIP_SHA=d5f3051b927f2f68cabac1a37c85d5113b9d77ad

          git clone https://github.com/SentinelOps-CI/provability-fabric /tmp/provability-fabric
          git -C /tmp/provability-fabric checkout "$PF_SHA"
          test "$(git -C /tmp/provability-fabric rev-parse HEAD)" = "$PF_SHA"

          git clone https://github.com/SentinelOps-CI/pcs-core /tmp/pcs-core
          git -C /tmp/pcs-core checkout "$PCS_SHA"
          test "$(git -C /tmp/pcs-core rev-parse HEAD)" = "$PCS_SHA"

          git clone https://github.com/SentinelOps-CI/post-incident-proofs /tmp/post-incident-proofs
          git -C /tmp/post-incident-proofs checkout "$PIP_SHA"
          test "$(git -C /tmp/post-incident-proofs rev-parse HEAD)" = "$PIP_SHA"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PF-Core validator
        run: |
          python -m pip install -q setuptools wheel jsonschema referencing pytest
          python -m pip install -q -e pf-core/validator

      - name: Export capability catalog
        run: python adapters/provability-fabric/export_catalog.py

      - name: Catalog drift check (Lean authority vs JSON export)
        run: pytest -q adapters/provability-fabric/tests/test_policy_correspondence.py::test_catalog_export_matches_lean

      - name: pytest provability-fabric adapter
        run: pytest -q adapters/provability-fabric/tests/

      - name: pytest pcs adapter (hash vectors)
        run: pytest -q adapters/pcs/tests/

      - name: Generate pcs replay trace fixture
        run: python adapters/pcs/normalize_release.py

      - name: Guard PIP smoke script integrity
        run: |
          test -s adapters/post_incident_proofs/smoke_test.sh
          grep -q emit-artifacts adapters/post_incident_proofs/smoke_test.sh

      - name: PIP smoke (emit-artifacts bundle)
        run: bash adapters/post_incident_proofs/smoke_test.sh

      - name: PF-Core verify-bundle reference guard
        run: |
          OUT="${TMPDIR:-/tmp}/pf-ci-bundle-$$"
          python -m pf_core.cli core emit-artifacts \
            --schemas pf-core/schemas \
            --file pf-core/examples/valid/mcp_sidecar_observation.json \
            --out-dir "$OUT"
          python -m pf_core.cli core verify-bundle \
            --schemas pf-core/schemas \
            --bundle-dir "$OUT" \
            --pf-core-version "$(cat pf-core/VERSION)"
          rm -rf "$OUT"

      - name: pytest pf-core validator unit tests
        run: pytest -q pf-core/validator/tests/
